project:
  name: 'new-hampshire-real-estate-data-2026'
  description: ''
  version: 0.1.0

data:
  data_source: 'kanchana1990/new-hampshire-real-estate-data-2026'

data_quality:
  data_shape: (5009, 11)

  duplicates_detected: true
  duplicate_count: 80
  duplicates_removed: true

  missing_values_detected: true
  data_type_issues_detected: false

data_leakage:
  checked: true

data_split:
  method: train_test_split # Kfold will be use later

  test_size: 0.2
  random_state: 42
  shuffle: true

  cross_validation:
    enabled: false # will add later
    type: null
    n_split: null
    shuffle: null
    random_state: null

feature_roles:

  numerical:
    continuous:
      - sqft
    binary_numerical: []
    discrete:
      - stories
      - beds
      - baths
      - baths_full
      - baths_full_calc
      - garage

  categorical:
    ordinal: []
    nominal:
      - type
    binary:
      - sub_type

  text:
    - text
  
  datetime: []
  high_cardinality: []
  drop: []

preprocessing:

  numerical:
    imputation_strategy: median
    scaling:
      required_for:
        - linear_models
        - knn
        - svm
      method: standard_scaler
    skew_handling:
      default_rule: no_transform
      apply_log_transform_if_skew_gt: 1

  categorical:
    imputation_strategy: most_frequent

    encoding:
      nominal: one_hot
      binary: label

  overrides:
    numerical:
      log_transform:
        - sqft
      investigate:
        - garage

    categorical: []

target_analysis:
  target_column: listPrice
  type_detected: continuous
  decision: regression